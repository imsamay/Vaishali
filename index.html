<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Vaishali</title>

<style>

body{
margin:0;
font-family:Arial;
overflow:hidden;
text-align:center;
}

/* ---------------- FIRST PAGE ---------------- */

#firstPage{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#cdb4db,#a2d2ff,#ffc8dd);
background-size:400% 400%;
animation:bgmove 10s infinite alternate;
color:#d90429;
}

@keyframes bgmove{
0%{background-position:left}
100%{background-position:right}
}

#firstPage h1{
font-size:65px;
}

#firstPage p{
font-size:24px;
max-width:650px;
color:#444;
}

/* ---------------- DARK SCENE ---------------- */

#darkScene{
display:none;
background:#050505;
height:100vh;
color:white;
position:relative;
}

/* message */

#topMessage{
position:absolute;
top:8%;
width:100%;
font-size:48px;
color:white;
text-shadow:0 0 15px red;
}

/* ---------------- 3D CAKE ---------------- */

.cake{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
perspective:800px;
}

/* layers */

.layer{
margin:auto;
border-radius:12px;
box-shadow:
0 8px 0 #4b2c20,
0 0 20px rgba(255,120,120,0.6);
}

.layer1{
width:260px;
height:80px;
background:linear-gradient(#5b3a29,#3b1f15);
}

.layer2{
width:200px;
height:70px;
background:linear-gradient(#6b4226,#3d2317);
margin-top:-12px;
}

.layer3{
width:140px;
height:60px;
background:linear-gradient(#7a4b2a,#3f2518);
margin-top:-12px;
position:relative;
}

/* chocolate topping */

.choco{
position:absolute;
width:100%;
height:20px;
background:#2d140c;
top:0;
border-radius:10px;
}

/* candles */

.candle{
width:12px;
height:45px;
background:white;
position:absolute;
top:-45px;
}

.flame{
width:14px;
height:14px;
background:orange;
border-radius:50%;
position:absolute;
top:-14px;
box-shadow:0 0 12px yellow;
}

#c1{left:25px}
#c2{left:65px}
#c3{left:105px}

/* fireworks canvas */

canvas{
position:absolute;
top:0;
left:0;
}

</style>

</head>

<body>

<!-- FIRST PAGE -->

<div id="firstPage">

<h1>🎉 Happy Birthday Vaishali 🎉</h1>

<p>
Today is not just another day…  
because someone incredibly special was born.  
Vaishali, may your life always be filled with laughter,  
dreams, and beautiful moments. 💖✨
</p>

</div>

<!-- DARK SCENE -->

<div id="darkScene">

<canvas id="fireworks"></canvas>

<div id="topMessage">
❤️ Happy Birthday Vaishali ❤️
</div>

<div class="cake">

<div class="layer layer3">

<div class="choco"></div>

<div class="candle" id="c1"><div class="flame"></div></div>
<div class="candle" id="c2"><div class="flame"></div></div>
<div class="candle" id="c3"><div class="flame"></div></div>

</div>

<div class="layer layer2"></div>
<div class="layer layer1"></div>

</div>

</div>

<script>

/* transition to dark scene */

setTimeout(()=>{
document.getElementById("firstPage").style.display="none"
document.getElementById("darkScene").style.display="block"
},5000)

/* fireworks */

const canvas=document.getElementById("fireworks")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

function createFirework(x,y){

for(let i=0;i<120;i++){

particles.push({
x:x,
y:y,
angle:Math.random()*Math.PI*2,
speed:Math.random()*5+2,
life:100
})

}

}

function startFireworks(){

setInterval(()=>{
createFirework(
Math.random()*canvas.width,
Math.random()*canvas.height/2
)
},600)

}

setTimeout(startFireworks,7000)

function animate(){

ctx.fillStyle="rgba(0,0,0,0.2)"
ctx.fillRect(0,0,canvas.width,canvas.height)

particles.forEach((p,i)=>{

p.x+=Math.cos(p.angle)*p.speed
p.y+=Math.sin(p.angle)*p.speed
p.life--

ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)"
ctx.fillRect(p.x,p.y,3,3)

if(p.life<=0){
particles.splice(i,1)
}

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
