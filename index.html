<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Vaishali</title>

<style>

body{
margin:0;
font-family:Arial;
overflow:hidden;
text-align:center;
}

/* FIRST PAGE */

#firstPage{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#ffc6ff,#bde0fe);
color:#ff2e63;
}

#firstPage h1{
font-size:60px;
}

#firstPage p{
font-size:22px;
max-width:600px;
}

/* DARK SCENE */

#darkScene{
display:none;
background:black;
height:100vh;
color:white;
position:relative;
}

/* MESSAGE ABOVE CAKE */

#topMessage{
position:absolute;
top:10%;
width:100%;
font-size:45px;
color:white;
text-shadow:0 0 10px pink;
}

/* CAKE */

.cake{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
}

.layer{
margin:auto;
border-radius:12px;
box-shadow:0 0 15px pink;
}

.layer1{width:220px;height:70px;background:#ff7eb3;}
.layer2{width:170px;height:60px;background:#ff9ac4;margin-top:-10px;}
.layer3{width:120px;height:50px;background:#ffc1dc;margin-top:-10px;position:relative;}

.candle{
width:10px;
height:40px;
background:white;
position:absolute;
top:-40px;
}

.flame{
width:12px;
height:12px;
background:orange;
border-radius:50%;
position:absolute;
top:-12px;
box-shadow:0 0 10px yellow;
}

#c1{left:20px}
#c2{left:55px}
#c3{left:90px}

canvas{
position:absolute;
top:0;
left:0;
}

</style>

</head>

<body>

<!-- FIRST PAGE -->

<div id="firstPage">

<h1>🎉 Happy Birthday Vaishali 🎉</h1>

<p>
Today is special because someone wonderful was born.  
Vaishali, may your smile always shine brighter than the stars  
and may every dream you have turn into reality. 💖✨
</p>

</div>

<!-- DARK SCENE -->

<div id="darkScene">

<canvas id="fireworks"></canvas>

<div id="topMessage">
❤️ Happy Birthday Vaishali ❤️
</div>

<div class="cake">

<div class="layer layer3">

<div class="candle" id="c1"><div class="flame"></div></div>
<div class="candle" id="c2"><div class="flame"></div></div>
<div class="candle" id="c3"><div class="flame"></div></div>

</div>

<div class="layer layer2"></div>
<div class="layer layer1"></div>

</div>

</div>

<script>

/* PAGE TRANSITION */

setTimeout(()=>{

document.getElementById("firstPage").style.display="none"
document.getElementById("darkScene").style.display="block"

},4000)

/* CANDLES ONLY FIRST */

setTimeout(()=>{

document.querySelector(".cake").style.opacity="0"

},4000)

setTimeout(()=>{

document.querySelector(".cake").style.opacity="1"
startFireworks()

},6000)

/* FIREWORKS */

const canvas=document.getElementById("fireworks")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

function createFirework(x,y){

for(let i=0;i<150;i++){

particles.push({
x:x,
y:y,
angle:Math.random()*Math.PI*2,
speed:Math.random()*5+2,
life:100
})

}

}

function startFireworks(){

setInterval(()=>{
createFirework(
Math.random()*canvas.width,
Math.random()*canvas.height/2
)
},600)

/* FIREWORK TEXT */

setTimeout(()=>{
alert("🎆 Happy Birthday Vaishali 🎆")
},3000)

}

function animate(){

ctx.fillStyle="rgba(0,0,0,0.2)"
ctx.fillRect(0,0,canvas.width,canvas.height)

particles.forEach((p,i)=>{

p.x+=Math.cos(p.angle)*p.speed
p.y+=Math.sin(p.angle)*p.speed
p.life--

ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)"
ctx.fillRect(p.x,p.y,3,3)

if(p.life<=0){
particles.splice(i,1)
}

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
