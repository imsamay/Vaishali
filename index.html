<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Vaishali</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
text-align:center;
}

/* -------- SCENE 1 -------- */

#scene1{
height:100vh;
background:white;
position:relative;
display:flex;
justify-content:center;
align-items:center;
}

#wallText{
font-size:60px;
color:#0077b6;
z-index:2;
}

/* balloon decoration */

.balloon{
width:45px;
height:55px;
border-radius:50%;
position:absolute;
}

.blue{background:#4cc9f0;}
.white{background:white;border:2px solid #ddd}

/* switch */

#switch{
position:absolute;
right:40px;
top:40px;
width:60px;
height:30px;
background:#ccc;
border-radius:20px;
cursor:pointer;
}

/* -------- SCENE 2 -------- */

#scene2{
display:none;
background:black;
height:100vh;
position:relative;
}

.candle{
width:14px;
height:60px;
background:white;
position:absolute;
bottom:45%;
}

.flame{
width:14px;
height:14px;
background:orange;
border-radius:50%;
position:absolute;
top:-14px;
box-shadow:0 0 12px yellow;
}

#c1{left:47%}
#c2{left:50%}
#c3{left:53%}

/* fireworks canvas */

canvas{
position:absolute;
top:0;
left:0;
}

/* -------- SCENE 3 -------- */

#scene3{
display:none;
height:100vh;
background:white;
position:relative;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#finalText{
font-size:55px;
color:#0077b6;
margin-bottom:40px;
}

/* 5 tier cake */

.cake{
position:relative;
}

.layer{
margin:auto;
border-radius:10px;
}

.l1{width:300px;height:70px;background:#ff7eb3;}
.l2{width:250px;height:65px;background:#ff9ac4;margin-top:-10px;}
.l3{width:200px;height:60px;background:#ffc1dc;margin-top:-10px;}
.l4{width:150px;height:55px;background:#ffd6e7;margin-top:-10px;}
.l5{width:100px;height:50px;background:#ffe5ec;margin-top:-10px;}

</style>

</head>

<body>

<!-- SCENE 1 -->

<div id="scene1">

<div id="wallText">
🎉 Happy Birthday Vaishali ♥️
</div>

<div id="switch"></div>

<!-- balloon wall decoration -->

<script>

for(let i=0;i<80;i++){

let b=document.createElement("div")

b.className="balloon "+(i%2==0?"blue":"white")

b.style.left=Math.random()*100+"vw"
b.style.top=Math.random()*100+"vh"

document.getElementById("scene1").appendChild(b)

}

</script>

</div>

<!-- SCENE 2 -->

<div id="scene2">

<canvas id="fireworks"></canvas>

<div class="candle" id="c1"><div class="flame"></div></div>
<div class="candle" id="c2"><div class="flame"></div></div>
<div class="candle" id="c3"><div class="flame"></div></div>

</div>

<!-- SCENE 3 -->

<div id="scene3">

<div id="finalText">
🎂 Happy Birthday Vaishali ❤️
</div>

<div class="cake">

<div class="layer l5"></div>
<div class="layer l4"></div>
<div class="layer l3"></div>
<div class="layer l2"></div>
<div class="layer l1"></div>

</div>

</div>

<script>

/* switch click */

document.getElementById("switch").onclick=()=>{

document.getElementById("scene1").style.display="none"
document.getElementById("scene2").style.display="block"

setTimeout(startFireworks,3000)

setTimeout(()=>{

document.getElementById("scene2").style.display="none"
document.getElementById("scene3").style.display="flex"

},5500)

}

/* fireworks */

const canvas=document.getElementById("fireworks")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

function firework(x,y){

for(let i=0;i<120;i++){

particles.push({
x:x,
y:y,
angle:Math.random()*Math.PI*2,
speed:Math.random()*5+2,
life:100
})

}

}

function startFireworks(){

setInterval(()=>{
firework(Math.random()*canvas.width,Math.random()*canvas.height/2)
},500)

}

function animate(){

ctx.fillStyle="rgba(0,0,0,0.2)"
ctx.fillRect(0,0,canvas.width,canvas.height)

particles.forEach((p,i)=>{

p.x+=Math.cos(p.angle)*p.speed
p.y+=Math.sin(p.angle)*p.speed
p.life--

ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)"
ctx.fillRect(p.x,p.y,3,3)

if(p.life<=0) particles.splice(i,1)

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
