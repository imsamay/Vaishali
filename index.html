<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Vaishali</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
overflow:hidden;
text-align:center;
}

#intro{
position:absolute;
top:45%;
width:100%;
font-size:60px;
opacity:0;
animation:fadeIn 2s forwards;
}

@keyframes fadeIn{
to{opacity:1}
}

#cakeScene{
display:none;
position:absolute;
top:40%;
width:100%;
}

.cake{
width:220px;
height:120px;
background:#ff7eb3;
margin:auto;
border-radius:10px;
position:relative;
box-shadow:0 0 20px pink;
}

.candle{
width:12px;
height:45px;
background:white;
position:absolute;
top:-45px;
}

.flame{
width:14px;
height:14px;
background:orange;
border-radius:50%;
position:absolute;
top:-14px;
left:-1px;
box-shadow:0 0 10px yellow;
}

#c1{left:50px}
#c2{left:100px}
#c3{left:150px}

#nameGlow{
display:none;
position:absolute;
top:15%;
width:100%;
font-size:50px;
color:#ff7eb3;
text-shadow:
0 0 10px pink,
0 0 20px pink,
0 0 40px hotpink;
}

canvas{
position:absolute;
top:0;
left:0;
}

#slice{
display:none;
font-size:70px;
margin-top:30px;
animation:feed 2s infinite alternate;
}

@keyframes feed{
0%{transform:translateY(0)}
100%{transform:translateY(-40px)}
}

</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div id="intro">
🎉 Happy Birthday Vaishali 🎉
</div>

<div id="nameGlow">
🎊 Happy Birthday Vaishali 🎊
</div>

<div id="cakeScene">

<div class="cake">

<div class="candle" id="c1"><div class="flame"></div></div>
<div class="candle" id="c2"><div class="flame"></div></div>
<div class="candle" id="c3"><div class="flame"></div></div>

</div>

<div id="slice">🍰</div>

</div>

<audio id="music">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4f9c7e3df3.mp3?filename=happy-birthday-126188.mp3">
</audio>

<script>

let music=document.getElementById("music")

setTimeout(()=>{
music.play()
},2000)

setTimeout(()=>{
document.getElementById("intro").style.display="none"
document.getElementById("cakeScene").style.display="block"
},3000)

setTimeout(()=>{
document.querySelectorAll(".flame").forEach(f=>f.style.display="none")
},4500)

setTimeout(()=>{
document.getElementById("nameGlow").style.display="block"
document.getElementById("slice").style.display="block"
startFireworks()
},5500)

const canvas=document.getElementById("fireworks")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

function createFirework(x,y){

for(let i=0;i<120;i++){

particles.push({
x:x,
y:y,
angle:Math.random()*2*Math.PI,
speed:Math.random()*5+2,
life:100
})

}

}

function startFireworks(){

setInterval(()=>{
createFirework(
Math.random()*canvas.width,
Math.random()*canvas.height/2
)
},600)

}

function animate(){

ctx.fillStyle="rgba(0,0,0,0.2)"
ctx.fillRect(0,0,canvas.width,canvas.height)

particles.forEach((p,i)=>{

p.x+=Math.cos(p.angle)*p.speed
p.y+=Math.sin(p.angle)*p.speed
p.life--

ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)"
ctx.fillRect(p.x,p.y,3,3)

if(p.life<=0){
particles.splice(i,1)
}

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
