<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Vaishali</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
color:white;
text-align:center;
}

#intro{
position:absolute;
top:40%;
width:100%;
font-size:50px;
}

#cakeScene{
display:none;
position:absolute;
top:40%;
width:100%;
}

.cake{
position:relative;
margin:auto;
width:200px;
height:120px;
background:#ff7eb3;
border-radius:10px;
}

.candle{
width:10px;
height:40px;
background:white;
position:absolute;
top:-40px;
}

.flame{
width:12px;
height:12px;
background:orange;
border-radius:50%;
position:absolute;
top:-12px;
left:-1px;
}

#c1{left:40px;}
#c2{left:90px;}
#c3{left:140px;}

#finalMessage{
display:none;
position:absolute;
top:10%;
width:100%;
font-size:40px;
}

#cakeSlice{
display:none;
font-size:60px;
margin-top:20px;
animation:feed 3s infinite alternate;
}

@keyframes feed{
0%{transform:translateY(0)}
100%{transform:translateY(-30px)}
}

canvas{
position:absolute;
top:0;
left:0;
}

</style>

</head>

<body>

<canvas id="fireworks"></canvas>

<div id="intro">
🎉 Happy Birthday Vaishali 🎉
</div>

<div id="cakeScene">

<div class="cake">

<div class="candle" id="c1"><div class="flame"></div></div>
<div class="candle" id="c2"><div class="flame"></div></div>
<div class="candle" id="c3"><div class="flame"></div></div>

</div>

<div id="cakeSlice">🍰</div>

</div>

<div id="finalMessage">
🎊 Happy Birthday Vaishali 🎊
</div>

<script>

let canvas=document.getElementById("fireworks");
let ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function firework(x,y){

for(let i=0;i<100;i++){

particles.push({
x:x,
y:y,
speed:Math.random()*5+2,
angle:Math.random()*2*Math.PI,
life:100
});

}

}

function animate(){

ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{

p.x+=Math.cos(p.angle)*p.speed;
p.y+=Math.sin(p.angle)*p.speed;
p.life--;

ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)";
ctx.fillRect(p.x,p.y,3,3);

if(p.life<=0){
particles.splice(i,1);
}

});

requestAnimationFrame(animate);

}

animate();

function startFireworks(){

setInterval(()=>{
firework(Math.random()*canvas.width,Math.random()*canvas.height/2);
},500);

}

setTimeout(()=>{

document.getElementById("intro").style.display="none";
document.getElementById("cakeScene").style.display="block";

},3000);

setTimeout(()=>{

document.querySelectorAll(".flame").forEach(f=>f.style.display="none");

},4500);

setTimeout(()=>{

document.getElementById("finalMessage").style.display="block";
document.getElementById("cakeSlice").style.display="block";
startFireworks();

},5000);

</script>

</body>
</html>
