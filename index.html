<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Vaishali ❤️</title>

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
overflow:hidden;
color:white;
text-align:center;
}

.container{
z-index:2;
}

h1{
font-size:50px;
margin-bottom:10px;
}

#message{
font-size:22px;
height:40px;
}

button{
margin-top:20px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:white;
color:#ff4081;
cursor:pointer;
}

button:hover{
background:#ffe4ec;
}

.heart{
position:absolute;
bottom:-20px;
font-size:24px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-110vh);}
}

.confetti{
position:absolute;
width:10px;
height:10px;
background:white;
top:-10px;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{transform:translateY(0) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Birthday Vaishali 🎉</h1>

<div id="message"></div>

<button onclick="surprise()">Click for Surprise 💖</button>

</div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>

let text="Vaishali, you make the world brighter just by being in it ❤️";
let i=0;

function type(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(type,60);
}
}

type();

function createHeart(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);
}

setInterval(createHeart,300);

function createConfetti(){
let confetti=document.createElement("div");
confetti.className="confetti";
confetti.style.left=Math.random()*100+"vw";
confetti.style.background="hsl("+Math.random()*360+"deg,100%,50%)";
document.body.appendChild(confetti);

setTimeout(()=>confetti.remove(),5000);
}

setInterval(createConfetti,200);

function surprise(){
document.getElementById("music").play();
alert("💖 Vaishali, today is all about you. Keep shining and smiling always! 💖");
}

</script>

</body>
</html>
