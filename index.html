<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Vaishali ♥️</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
text-align:center;
}

/* ---------- SCENE 1 ---------- */

#scene1{
height:100vh;
background:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
}

#title{
font-size:55px;
color:#0077b6;
margin-bottom:40px;
}

.balloon{
width:40px;
height:50px;
background:#90dbf4;
border-radius:50%;
position:absolute;
}

.balloon.white{
background:white;
border:2px solid #ccc;
}

.floorBalloon{
bottom:20px;
}

/* switch */

.switch{
width:60px;
height:30px;
background:#ccc;
border-radius:20px;
position:absolute;
right:40px;
top:40px;
}

/* ---------- SCENE 2 ---------- */

#scene2{
display:none;
height:100vh;
background:black;
position:relative;
}

.candle{
width:12px;
height:60px;
background:white;
position:absolute;
bottom:40%;
}

.flame{
width:14px;
height:14px;
background:orange;
border-radius:50%;
position:absolute;
top:-14px;
box-shadow:0 0 10px yellow;
}

#c1{left:45%}
#c2{left:50%}
#c3{left:55%}

canvas{
position:absolute;
top:0;
left:0;
}

/* ---------- SCENE 3 ---------- */

#scene3{
display:none;
height:100vh;
background:white;
position:relative;
}

#finalText{
position:absolute;
top:10%;
width:100%;
font-size:50px;
color:#0077b6;
}

/* cake */

.cake{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
}

.layer{
margin:auto;
border-radius:10px;
}

.layer1{width:260px;height:80px;background:#ff7eb3;}
.layer2{width:200px;height:70px;background:#ff9ac4;margin-top:-10px;}
.layer3{width:140px;height:60px;background:#ffc1dc;margin-top:-10px;}

/* confetti */

.confetti{
position:absolute;
width:8px;
height:8px;
background:red;
animation:fall 4s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-20px)}
100%{transform:translateY(110vh)}
}

</style>

</head>

<body>

<!-- SCENE 1 -->

<div id="scene1">

<div id="title">
🎉 Happy Birthday Vaishali ♥️🫶🏻
</div>

<div class="switch"></div>

<div class="balloon" style="left:20%;top:20%"></div>
<div class="balloon white" style="left:30%;top:25%"></div>
<div class="balloon" style="left:70%;top:22%"></div>
<div class="balloon white" style="left:60%;top:18%"></div>

<div class="balloon floorBalloon" style="left:25%"></div>
<div class="balloon white floorBalloon" style="left:50%"></div>
<div class="balloon floorBalloon" style="left:75%"></div>

</div>

<!-- SCENE 2 -->

<div id="scene2">

<canvas id="fireworks"></canvas>

<div class="candle" id="c1"><div class="flame"></div></div>
<div class="candle" id="c2"><div class="flame"></div></div>
<div class="candle" id="c3"><div class="flame"></div></div>

</div>

<!-- SCENE 3 -->

<div id="scene3">

<div id="finalText">
🎂 Happy Birthday Vaishali ❤️
</div>

<div class="cake">
<div class="layer layer3"></div>
<div class="layer layer2"></div>
<div class="layer layer1"></div>
</div>

</div>

<script>

/* scene transitions */

setTimeout(()=>{
document.getElementById("scene1").style.display="none"
document.getElementById("scene2").style.display="block"
},2500)

setTimeout(()=>{
startFireworks()
},5500)

setTimeout(()=>{
document.getElementById("scene2").style.display="none"
document.getElementById("scene3").style.display="block"
createConfetti()
},8000)

/* fireworks */

const canvas=document.getElementById("fireworks")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

function createFirework(x,y){

for(let i=0;i<120;i++){

particles.push({
x:x,
y:y,
angle:Math.random()*Math.PI*2,
speed:Math.random()*5+2,
life:100
})

}

}

function startFireworks(){

setInterval(()=>{
createFirework(Math.random()*canvas.width,Math.random()*canvas.height/2)
},500)

}

function animate(){

ctx.fillStyle="rgba(0,0,0,0.2)"
ctx.fillRect(0,0,canvas.width,canvas.height)

particles.forEach((p,i)=>{

p.x+=Math.cos(p.angle)*p.speed
p.y+=Math.sin(p.angle)*p.speed
p.life--

ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)"
ctx.fillRect(p.x,p.y,3,3)

if(p.life<=0) particles.splice(i,1)

})

requestAnimationFrame(animate)

}

animate()

/* confetti */

function createConfetti(){

setInterval(()=>{

let c=document.createElement("div")
c.className="confetti"

c.style.left=Math.random()*100+"vw"
c.style.background="hsl("+Math.random()*360+",100%,50%)"

document.body.appendChild(c)

setTimeout(()=>{c.remove()},4000)

},200)

}

</script>

</body>
</html>
