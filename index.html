<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Vaishali</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
color:white;
text-align:center;
}

#intro{
position:absolute;
top:40%;
width:100%;
font-size:60px;
opacity:0;
animation:fade 3s forwards;
}

@keyframes fade{
to{opacity:1}
}

#name{
display:none;
position:absolute;
top:15%;
width:100%;
font-size:55px;
color:#ff7eb3;
text-shadow:0 0 20px pink,0 0 40px hotpink;
}

#cakeScene{
display:none;
position:absolute;
top:45%;
width:100%;
}

/* 3 tier cake */

.cake{
position:relative;
width:200px;
margin:auto;
}

.layer{
margin:auto;
border-radius:10px;
box-shadow:0 0 15px pink;
}

.layer1{
width:200px;
height:60px;
background:#ff7eb3;
}

.layer2{
width:150px;
height:50px;
background:#ff9ac4;
margin-top:-10px;
}

.layer3{
width:100px;
height:40px;
background:#ffc1dc;
margin-top:-10px;
position:relative;
}

/* candles */

.candle{
width:10px;
height:35px;
background:white;
position:absolute;
top:-35px;
}

.flame{
width:12px;
height:12px;
background:orange;
border-radius:50%;
position:absolute;
top:-12px;
box-shadow:0 0 10px yellow;
}

#c1{left:15px}
#c2{left:45px}
#c3{left:75px}

/* rose petals */

.petal{
position:absolute;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px)}
100%{transform:translateY(110vh)}
}

canvas{
position:absolute;
top:0;
left:0;
}

</style>

</head>

<body>

<canvas id="fireworks"></canvas>

<div id="intro">
🎉 Happy Birthday Vaishali 🎉
</div>

<div id="name">
🎊 Happy Birthday Vaishali 🎊
</div>

<div id="cakeScene">

<div class="cake">

<div class="layer layer3">

<div class="candle" id="c1"><div class="flame"></div></div>
<div class="candle" id="c2"><div class="flame"></div></div>
<div class="candle" id="c3"><div class="flame"></div></div>

</div>

<div class="layer layer2"></div>
<div class="layer layer1"></div>

</div>

</div>

<audio id="music">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4f9c7e3df3.mp3">
</audio>

<script>

let music=document.getElementById("music")

setTimeout(()=>{music.play()},2000)

/* intro transition */

setTimeout(()=>{
document.getElementById("intro").style.display="none"
document.getElementById("name").style.display="block"
},3000)

setTimeout(()=>{
document.getElementById("cakeScene").style.display="block"
},4500)

/* blow candles */

setTimeout(()=>{
document.querySelectorAll(".flame").forEach(f=>f.style.display="none")
startFireworks()
},6000)

/* petals */

function createPetal(){

let p=document.createElement("div")
p.className="petal"
p.innerHTML="🌹"
p.style.left=Math.random()*100+"vw"
p.style.animationDuration=(5+Math.random()*5)+"s"

document.body.appendChild(p)

setTimeout(()=>{p.remove()},10000)

}

setInterval(createPetal,400)

/* fireworks */

const canvas=document.getElementById("fireworks")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

function createFirework(x,y){

for(let i=0;i<120;i++){

particles.push({
x:x,
y:y,
angle:Math.random()*Math.PI*2,
speed:Math.random()*5+2,
life:100
})

}

}

function startFireworks(){

setInterval(()=>{
createFirework(
Math.random()*canvas.width,
Math.random()*canvas.height/2
)
},600)

}

function animate(){

ctx.fillStyle="rgba(0,0,0,0.2)"
ctx.fillRect(0,0,canvas.width,canvas.height)

particles.forEach((p,i)=>{

p.x+=Math.cos(p.angle)*p.speed
p.y+=Math.sin(p.angle)*p.speed
p.life--

ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)"
ctx.fillRect(p.x,p.y,3,3)

if(p.life<=0){
particles.splice(i,1)
}

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
