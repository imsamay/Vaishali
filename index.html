<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Vaishali</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
text-align:center;
}

h1{
font-size:50px;
margin-bottom:20px;
}

#text{
font-size:22px;
min-height:40px;
}

button{
margin-top:20px;
padding:12px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:white;
color:#ff4081;
cursor:pointer;
}

button:hover{
background:#ffd9e6;
}

canvas{
position:absolute;
top:0;
left:0;
}

.heart{
position:absolute;
bottom:-30px;
font-size:22px;
animation:rise linear infinite;
}

@keyframes rise{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div>
<h1>🎉 Happy Birthday Vaishali 🎉</h1>
<div id="text"></div>
<button onclick="startSurprise()">Open Your Surprise 💖</button>
</div>

<audio id="music">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4f9c7e3df3.mp3?filename=happy-birthday-126188.mp3" type="audio/mpeg">
</audio>

<script>

let message="Vaishali, today is special because the world got someone as beautiful and amazing as you. May your smile always shine like the brightest star. 💖";

let i=0;
function type(){
if(i<message.length){
document.getElementById("text").innerHTML+=message.charAt(i);
i++;
setTimeout(type,50);
}
}

function startSurprise(){
document.getElementById("music").play();
alert("🎂 Happy Birthday Vaishali! You deserve all the happiness in the world. 💖");
}

type();

function createHeart(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(4+Math.random()*4)+"s";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),8000);
}

setInterval(createHeart,300);

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let pieces=[];
for(let i=0;i<120;i++){
pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:5+Math.random()*5,
speed:1+Math.random()*3,
angle:Math.random()*360
});
}

function update(){
ctx.clearRect(0,0,canvas.width,canvas.height);

pieces.forEach(p=>{
ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)";
ctx.fillRect(p.x,p.y,p.size,p.size);
p.y+=p.speed;

if(p.y>canvas.height){
p.y=0;
p.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(update);
}

update();

</script>

</body>
</html>
