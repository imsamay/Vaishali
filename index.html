<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Vaishali 🎂</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(120deg,#ff758c,#ff7eb3);
overflow:hidden;
}

h1{
color:white;
font-size:60px;
margin-top:40px;
text-shadow:0 0 20px white;
}

.message{
color:white;
font-size:24px;
margin-bottom:30px;
}

.gallery{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
margin-top:30px;
}

.gallery img{
width:320px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.08);
}

.cake{
font-size:120px;
margin-top:20px;
}

.balloon{
position:fixed;
bottom:-100px;
font-size:40px;
animation:float 8s infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

</style>
</head>

<body>

<h1>🎉 Happy Birthday Vaishali 🎉</h1>

<p class="message">
Wishing you happiness, love and lots of smiles today and always ❤️
</p>

<div class="cake">
🎂🕯️🕯️🕯️
</div>

<div class="gallery">

<img src="vaishali1.jpg">
<img src="vaishali2.jpg">

</div>

<script>

for(let i=0;i<15;i++){

let balloon=document.createElement("div")
balloon.className="balloon"
balloon.innerHTML="🎈"

balloon.style.left=Math.random()*100+"%"
balloon.style.animationDuration=5+Math.random()*5+"s"

document.body.appendChild(balloon)

}

</script>

</body>
</html>
